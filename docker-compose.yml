version: "3.9"

services:
  app:
    build: .
    container_name: codexwebz-app
    ports:
      - "4000:4000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "npm run seed && npm start"
    volumes:
      - ./uploads:/app/uploads

  mysql:
    image: mysql:8.0
    container_name: codexwebz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-codexwebz}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-password}"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  mysql_data:
